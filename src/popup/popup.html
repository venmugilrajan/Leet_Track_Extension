<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetTrack Pro</title>
  <link rel="stylesheet" href="../assets/style/material-icons.css">
  <link rel="stylesheet" href="../assets/style/common.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-body">
  <div class="popup-card animated">
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <span class="material-icons logo-icon">auto_awesome_motion</span>
        <h1 class="font-title">LeetTrack <span class="accent-text">Pro</span></h1>
      </div>
      <button id="open-dashboard" class="dashboard-btn" title="Open Full Dashboard">
        <span class="material-icons">space_dashboard</span>
      </button>
    </header>

    <!-- GitHub Connection Status -->
    <div class="status-container" id="github-status">
      <div class="status-icon-wrapper">
        <span class="material-icons">cloud_off</span>
      </div>
      <div class="status-info">
        <div class="status-title">GitHub Disconnected</div>
        <div class="status-desc">Click to set up settings</div>
      </div>
    </div>

    <!-- Quick Stats Grid -->
    <div class="stats-grid">
      <div class="stat-item solved-box">
        <div class="stat-icon-row">
          <span class="material-icons">check_circle</span>
        </div>
        <div class="stat-details">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-lbl">Solved</div>
        </div>
      </div>
      
      <div class="stat-item streak-box">
        <div class="stat-icon-row">
          <span class="material-icons">local_fire_department</span>
        </div>
        <div class="stat-details">
          <div class="stat-num" id="stat-streak">0</div>
          <div class="stat-lbl">Streak</div>
        </div>
      </div>
    </div>

    <!-- Custom Progress Bar -->
    <div class="progress-section">
      <div class="progress-header">
        <span>Easy/Medium/Hard Breakdown</span>
      </div>
      <div class="difficulty-bar">
        <div class="diff-seg easy" id="bar-easy" style="width: 0%" title="Easy"></div>
        <div class="diff-seg medium" id="bar-medium" style="width: 0%" title="Medium"></div>
        <div class="diff-seg hard" id="bar-hard" style="width: 0%" title="Hard"></div>
      </div>
    </div>

    <!-- Sync Actions (if pending) -->
    <div class="sync-actions" id="sync-container" style="display: none;">
      <p id="unsynced-text">You have 0 uncommitted solutions.</p>
      <button id="sync-now" class="sync-btn">
        <span class="material-icons">sync</span> Sync Now
      </button>
    </div>

    <!-- Footer Problem Info -->
    <footer class="footer">
      <div class="footer-card">
        <span class="material-icons footer-icon">description</span>
        <div class="footer-details">
          <div class="footer-lbl">Last Solved Problem</div>
          <div id="last-solved-title" class="footer-val">-</div>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
